<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparing your download...</title>
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            text-align: center;
            padding: 50px 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 90%;
        }

        h2 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; line-height: 1.5; }

        #final-trigger {
            background-color: #2ecc71;
            color: white;
            padding: 18px 36px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        #final-trigger:hover {
            transform: translateY(-2px);
            background-color: #27ae60;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        #final-trigger:active { transform: translateY(0); }

        #countdown {
            font-size: 26px;
            font-weight: bold;
            color: #e74c3c;
            margin: 25px 0;
        }

        .ad-container {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .ad-label {
            font-size: 10px;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="dynamic-title">Verifying Request...</h2>
        <p id="dynamic-sub">Please wait while we prepare your file.</p>


        <div id="countdown">
            Ready in <span id="seconds">10</span>s...
        </div>

        <a id="final-trigger" target="_blank" rel="noopener noreferrer">
            DOWNLOAD NOW
        </a>


        <div class="ad-container">
            <p class="ad-label">Sponsored Content</p>
            <div id="adsterra-banner-slot">
                <!-- Adsterra Banner -->
                <script type="text/javascript">
                    atOptions = {
                        'key': '3d1c1f9e7c2eaa2376d0e9f50f0669d8',
                        'format': 'iframe',
                        'height': 250,
                        'width': 300,
                        'params': {}
                    };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/3d1c1f9e7c2eaa2376d0e9f50f0669d8/invoke.js"></script>
            </div>
        </div>
    </div>

    <script>
        const fileDatabase = {
            '2D1N': {
                title: 'Mt. Negron 2D1N - Itinerary',
                fileUrl: 'https://drive.google.com/uc?export=download&id=1Z9vBga9B7Biws7mEUwO91TclEpcXLWlN'
            },
            '3D2N': {
                title: 'Mt. Negron 3D2N - Itinerary',
                fileUrl: 'https://drive.google.com/uc?export=download&id=1AcnXgox3dYsFYwLqhZxK3-lt6WgN3DS9'
            }
        };

        const params = new URLSearchParams(window.location.search);
        let fileId = (params.get('id') || "").toUpperCase();
        const data = fileDatabase[fileId];

        if (data) {
            document.title = "Download: " + data.title;
            document.getElementById('dynamic-title').innerText = "Preparing your " + data.title + "...";
            document.getElementById('dynamic-sub').innerText = "Please wait while we prepare your " + data.title + ".";

            const downloadBtn = document.getElementById('final-trigger');
            downloadBtn.href = data.fileUrl;
            downloadBtn.innerText = "DOWNLOAD " + data.title.toUpperCase() + " NOW";


            let timeLeft = 10;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('dynamic-title').innerText = data.title + " is Ready!";
                    document.getElementById('dynamic-sub').style.display = 'none';
                    document.getElementById('countdown').style.display = 'none';
                    downloadBtn.style.display = 'inline-block';
                }
            }, 1000);
        } else {
            document.getElementById('dynamic-title').innerText = "Error: Invalid Link";
            document.getElementById('dynamic-sub').innerText = "We couldn't find the file you're looking for.";
            document.getElementById('countdown').style.display = "none";
        }

    </script>

    <!-- Social Bar Ads -->
    <script type='text/javascript' src='//pl29434660.profitablecpmratenetwork.com/c1/98/75/c198754349b7a6194e138290aa5675bb.js'></script>

</body>
</html>
