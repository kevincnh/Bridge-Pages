<script>
    const fileDatabase = {
        '2D1N': {
            title: 'Mt. Negron 2D1N - Itinerary',
            fileUrl: 'https://drive.google.com/uc?export=download&id=1Z9vBga9B7Biws7mEUwO91TclEpcXLWlN',
            adUrl: 'https://www.profitablecpmratenetwork.com/mv8hk59q?key=29ab0de8ec6b25d247ba0857470888d5'
        },
        '3D2N': {
            title: 'Mt. Negron 3D2N - Itinerary',
            fileUrl: 'https://drive.google.com/uc?export=download&id=1AcnXgox3dYsFYwLqhZxK3-lt6WgN3DS9',
            adUrl: 'https://www.profitablecpmratenetwork.com/mv8hk59q?key=29ab0de8ec6b25d247ba0857470888d5'
        }
    };

    function getFileId() {
        // Tier 1: Check the iframe's own URL
        let params = new URLSearchParams(window.location.search);
        let id = params.get('id');
        if (id) return id;

        // Tier 2: Check the main browser URL (GoDaddy wrapper)
        try {
            params = new URLSearchParams(window.top.location.search);
            id = params.get('id');
            if (id) return id;
        } catch (e) {
            console.warn("Cross-origin restriction: Cannot access top window URL.");
        }

        // Tier 3: Check the referrer (useful if redirected)
        try {
            if (document.referrer) {
                const refUrl = new URL(document.referrer);
                id = new URLSearchParams(refUrl.search).get('id');
                if (id) return id;
            }
        } catch (e) {
            // Referrer not available or not a valid URL
        }

        return null;
    }

    let fileId = getFileId();

    // DEBUG: Uncomment the line below if it still shows error to see what ID is being read
    // alert("Detected ID: " + fileId); 

    if (fileId) {
        fileId = fileId.toUpperCase(); // Force uppercase to prevent case errors
    }

    const data = fileDatabase[fileId];

    if (data) {
        const fullTitle = "Download: " + data.title;
        document.title = fullTitle; // Update iframe title
        try {
            window.top.document.title = fullTitle; // Attempt to update main tab title
        } catch (e) {
            // Likely blocked by cross-origin security
        }
        document.getElementById('dynamic-title').innerText = "Preparing your " + data.title + "...";

        let timeLeft = 10;
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('dynamic-title').innerText = "Your " + data.title + " is Ready!";
                document.getElementById('dynamic-sub').style.display = 'none'; // Hide verification text
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('final-trigger').style.display = 'inline-block';
            }
        }, 1000);

        document.getElementById('final-trigger').addEventListener('click', function () {
            // 1. Attempt to open ad in a new tab
            try {
                window.open(data.adUrl, '_blank');
            } catch (e) {
                console.warn("Ad popup blocked.");
            }

            // 2. Trigger download in the current tab IMMEDIATELY
            // This ensures the user gets their file even if the ad link is flagged.
            window.location.href = data.fileUrl;
        });
    } else {
        document.getElementById('dynamic-title').innerText = "Error: File Not Found";
        document.getElementById('dynamic-sub').innerHTML = "We couldn't find a file for ID: <b>" + (fileId || "NONE") + "</b>. <br>Please check your link.";
        document.getElementById('countdown').style.display = "none";
    }
</script>
